<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini AI Studio Automator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <!-- ===== HEADER ===== -->
    <header class="header">
      <div class="header-logo">
        <svg class="logo-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 2C14 8.627 8.627 14 2 14C8.627 14 14 19.373 14 26C14 19.373 19.373 14 26 14C19.373 14 14 8.627 14 2Z" fill="url(#gemini-gradient)"/>
          <defs>
            <linearGradient id="gemini-gradient" x1="2" y1="2" x2="26" y2="26" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#8AB4F8"/>
              <stop offset="100%" stop-color="#C58AF9"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="header-title">AI Studio Automator</span>
      </div>
      <div id="status-badge" class="status-badge status-idle">Ready</div>
    </header>

    <!-- ===== MODEL SELECTOR ===== -->
    <section class="card">
      <label class="label" for="model-select">
        <svg class="label-icon" viewBox="0 0 20 20" fill="currentColor">
          <path d="M13 7H7v6h6V7z"/>
          <path fill-rule="evenodd" d="M7 2a1 1 0 012 0v1h2V2a1 1 0 112 0v1h2a2 2 0 012 2v2h1a1 1 0 110 2h-1v2h1a1 1 0 110 2h-1v2a2 2 0 01-2 2h-2v1a1 1 0 11-2 0v-1H9v1a1 1 0 11-2 0v-1H5a2 2 0 01-2-2v-2H2a1 1 0 110-2h1V9H2a1 1 0 010-2h1V5a2 2 0 012-2h2V2zM5 5h10v10H5V5z" clip-rule="evenodd"/>
        </svg>
        AI Model
      </label>
      <select id="model-select" class="select">
        <optgroup label="Gemini 2.5">
          <option value="Gemini 2.5 Pro">Gemini 2.5 Pro</option>
          <option value="Gemini 2.5 Flash" selected>Gemini 2.5 Flash (Recommended)</option>
          <option value="Gemini 2.5 Flash Lite">Gemini 2.5 Flash Lite</option>
        </optgroup>
        <optgroup label="Gemini 2.0">
          <option value="Gemini 2.0 Pro Experimental">Gemini 2.0 Pro Experimental</option>
          <option value="Gemini 2.0 Flash Thinking Experimental">Gemini 2.0 Flash Thinking Experimental</option>
          <option value="Gemini 2.0 Flash Experimental">Gemini 2.0 Flash Experimental</option>
          <option value="Gemini 2.0 Flash">Gemini 2.0 Flash</option>
          <option value="Gemini 2.0 Flash Lite">Gemini 2.0 Flash Lite</option>
        </optgroup>
        <optgroup label="Gemini 1.5">
          <option value="Gemini 1.5 Pro">Gemini 1.5 Pro</option>
          <option value="Gemini 1.5 Flash">Gemini 1.5 Flash</option>
          <option value="Gemini 1.5 Flash 8B">Gemini 1.5 Flash 8B</option>
        </optgroup>
        <optgroup label="Gemini 1.0">
          <option value="Gemini 1.0 Pro">Gemini 1.0 Pro</option>
        </optgroup>
      </select>
    </section>

    <!-- ===== SYSTEM PROMPT ===== -->
    <section class="card">
      <label class="label" for="system-prompt">
        <svg class="label-icon" viewBox="0 0 20 20" fill="currentColor">
          <path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 10a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zM14 9a1 1 0 00-1 1v6a1 1 0 001 1h2a1 1 0 001-1v-6a1 1 0 00-1-1h-2z"/>
        </svg>
        System Prompt
      </label>
      <textarea
        id="system-prompt"
        class="textarea"
        placeholder="Enter the system instruction for the AI model...&#10;&#10;e.g. You are a helpful assistant that extracts key information from text."
        rows="4"
      ></textarea>
      <div class="char-counter"><span id="prompt-char-count">0</span> chars</div>
    </section>

    <!-- ===== FILE LOADER ===== -->
    <section class="card">
      <label class="label">
        <svg class="label-icon" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z" clip-rule="evenodd"/>
        </svg>
        Input File
      </label>

      <div class="file-drop-zone" id="file-drop-zone">
        <input type="file" id="file-input" accept=".xlsx,.xls,.csv" hidden />
        <svg viewBox="0 0 48 48" fill="none" width="32" height="32">
          <path d="M24 4C24 15.046 15.046 24 4 24C15.046 24 24 32.954 24 44C24 32.954 32.954 24 44 24C32.954 24 24 15.046 24 4Z" fill="url(#file-grad)" opacity="0.25"/>
          <defs><linearGradient id="file-grad" x1="4" y1="4" x2="44" y2="44" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#8AB4F8"/><stop offset="100%" stop-color="#C58AF9"/></linearGradient></defs>
        </svg>
        <p class="file-drop-label">Drop <strong>.xlsx</strong> or <strong>.csv</strong> here</p>
        <button id="file-browse-btn" class="btn btn-secondary btn-sm">Browse File</button>
      </div>

      <div id="file-info" class="file-info hidden">
        <div class="file-info-inner">
          <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14" style="color:var(--accent-blue);flex-shrink:0">
            <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd"/>
          </svg>
          <span id="file-name" class="file-name">—</span>
          <span id="file-rows" class="file-badge">0 rows</span>
          <button id="file-clear-btn" class="btn-icon-only" title="Remove file">
            <svg viewBox="0 0 20 20" fill="currentColor" width="13" height="13"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
          </button>
        </div>
      </div>

      <!-- Column Selector (appears after file load) -->
      <div id="column-selector-wrap" class="hidden">
        <label class="label" for="input-column" style="margin-bottom:4px">
          Input Column
        </label>
        <select id="input-column" class="select select-sm"></select>
      </div>
    </section>

    <!-- ===== ROW RANGE ===== -->
    <section class="card">
      <label class="label">
        <svg class="label-icon" viewBox="0 0 20 20" fill="currentColor">
          <path d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zM5 11a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5zM11 5a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V5zM11 13a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
        </svg>
        Row Range
      </label>
      <div class="row-range-grid">
        <div class="row-range-field">
          <label class="sub-label" for="start-row">Start Row</label>
          <input type="number" id="start-row" class="input input-sm" value="1" min="1" />
        </div>
        <div class="row-range-divider">—</div>
        <div class="row-range-field">
          <label class="sub-label" for="end-row">End Row</label>
          <input type="number" id="end-row" class="input input-sm" value="10" min="1" />
        </div>
        <div class="row-count-chip" id="row-count-chip">10 rows</div>
      </div>
    </section>

    <!-- ===== PROGRESS BAR ===== -->
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-header">
        <span class="progress-label" id="progress-label">Waiting to start...</span>
        <span class="progress-pct" id="progress-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-bar" id="progress-bar" style="width:0%"></div>
      </div>
      <div class="progress-detail" id="progress-detail">Row 0 of 0</div>
    </div>

    <!-- ===== ACTION BUTTONS ===== -->
    <div class="action-row">
      <button id="start-btn" class="btn btn-primary btn-action">
        <span id="start-btn-text">
          <svg class="btn-icon" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/>
          </svg>
          Start
        </span>
        <span id="start-btn-loading" class="hidden">
          <span class="spinner"></span>
          Running...
        </span>
      </button>

      <button id="stop-btn" class="btn btn-danger btn-action" disabled>
        <svg class="btn-icon" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clip-rule="evenodd"/>
        </svg>
        Stop
      </button>
    </div>

    <!-- ===== LOG / STATUS AREA ===== -->
    <div id="log-box" class="log-box hidden"></div>

    <footer class="footer">
      AI Studio Automator &middot; v2.0.0 &middot; Manifest V3
    </footer>

  </div>

  <script src="xlsx.full.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
